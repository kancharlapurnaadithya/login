<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | SecureApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <nav class="navbar shadow">
        <h1>SecureApp</h1>
        <button id="logout-btn" class="btn-logout">Logout</button>
    </nav>

    <div class="container mt-50">
        <div id="profile-card" class="profile-card shadow hidden">
            <div class="profile-header"></div>
            <div class="profile-content text-center">
                <img id="user-photo" src="" alt="Profile Picture" class="profile-img">
                <h2 id="user-name">Loading...</h2>
                <p id="user-email"></p>
                <div class="status-badge">Authenticated</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initAuthCheck, logoutUser } from './auth.js';
        
        // This ensures only logged-in users stay here
        initAuthCheck('dashboard');

        document.getElementById('logout-btn').addEventListener('click', logoutUser);
    </script>
</body>
</html>
